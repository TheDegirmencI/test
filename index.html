<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koncuk Pastanesi - QR Menü</title>
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen pb-8 antialiased">

    <!-- Koncuk Pastanesi Header -->
    <header class="bg-stone-900 text-stone-100 py-8 text-center shadow-md mb-6 border-b-4 border-amber-500 relative overflow-hidden">
        <div class="relative z-10">
            <h1 class="text-2xl font-black tracking-widest text-amber-400 uppercase">KONCUK</h1>
            <p class="text-amber-100/80 text-xs tracking-wider uppercase mt-1 font-medium">P a s t a n e s i</p>
            <div class="w-12 h-0.5 bg-amber-500 mx-auto mt-3"></div>
        </div>
        <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#f59e0b_1px,transparent_1px)] [background-size:16px_16px]"></div>
    </header>

    <!-- Ana Konteyner -->
    <main class="max-w-md mx-auto px-4">
        
        <!-- Kategoriler -->
        <div id="categories" class="flex gap-2 overflow-x-auto pb-4 mb-4 scrollbar-none snap-x"></div>

        <!-- Ürün Kartları Listesi -->
        <div id="menu-items" class="space-y-4">
            <div class="flex flex-col items-center justify-center py-12">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-amber-600 mb-3"></div>
                <p class="text-sm text-stone-500 font-medium">Lezzetler yükleniyor...</p>
            </div>
        </div>

    </main>

    <script>
        // ===================================================
        // SADECE BURAYA KENDİ GOOGLE SHEET ID'Nİ YAPIŞTIR
        // ===================================================
        const SHEET_ID = '1jNADW0b_Hz8lmTrIuIr7QhupaMttfag-L1fLfqSiDy4'; 
        
        const url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json";
        let menuData = [];
        let activeCategory = 'Hepsi';

        async function fetchMenu() {
            try {
                const res = await fetch(url);
                const text = await res.text();
                
                const temp = text.substring(47).slice(0, -2);
                const json = JSON.parse(temp);
                const rows = json.table.rows;
                
                menuData = rows.map(function(row) {
                    return {
                        category: row.c[0] && row.c[0].v ? row.c[0].v.trim() : 'Diğer',
                        name: row.c[1] && row.c[1].v ? row.c[1].v.trim() : '',
                        description: row.c[2] && row.c[2].v ? row.c[2].v.trim() : '',
                        price: row.c[3] && row.c[3].v ? row.c[3].v : 0,
                        image: row.c[4] && row.c[4].v ? row.c[4].v.trim() : 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500',
                        active: row.c[5] && row.c[5].v ? row.c[5].v.trim().toUpperCase() : 'Y'
                    };
                }).filter(function(item) {
                    return item.active === 'Y' && item.name !== '';
                });

                renderCategories();
                renderItems();
            } catch (err) {
                console.error("Hata:", err);
                document.getElementById('menu-items').innerHTML = '<div class="text-center py-8 bg-red-50 rounded-xl border border-red-100 p-4"><p class="text-red-600 font-medium text-sm">Menü şu an yüklenemedi.</p></div>';
            }
        }

        function renderCategories() {
            const rawCategories = menuData.map(function(item) { return item.category; });
            const uniqueCategories = ['Hepsi', ...new Set(rawCategories)];
            const container = document.getElementById('categories');
            
            container.innerHTML = uniqueCategories.map(function(cat) {
                const isSelected = cat === activeCategory;
                const btnClass = isSelected 
                    ? 'bg-amber-950 text-amber-400 border-amber-950 font-semibold shadow-md' 
                    : 'bg-white text-stone-600 border-stone-200/80 hover:bg-stone-50';
                
                return '<button onclick="filterCategory(\'' + cat + '\')" class="px-5 py-2.5 rounded-full text-xs tracking-wide font-medium border transition-all duration-200 whitespace-nowrap snap-center ' + btnClass + '">' + cat + '</button>';
            }).join('');
        }

        function renderItems() {
            const container = document.getElementById('menu-items');
            const filtered = activeCategory === 'Hepsi' 
                ? menuData 
                : menuData.filter(function(item) { return item.category === activeCategory; });
            
            if(filtered.length === 0) {
                container.innerHTML = '<p class="text-stone-400 text-center py-12 text-sm font-medium">Bu kategoride henüz ürün bulunmuyor.</p>';
                return;
            }

            container.innerHTML = filtered.map(function(item) {
                return '<div class="bg-white rounded-2xl shadow-xs border border-stone-100 overflow-hidden flex h-28 transition-transform duration-200 active:scale-[0.99]">' +
                    '<div class="w-28 h-full flex-shrink-0 relative bg-stone-100">' +
                        '<img src="' + item.image + '" class="w-full h-full object-cover" alt="' + item.name + '" onerror="this.src=\'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500\'">' +
                    '</div>' +
                    '<div class="p-3.5 flex flex-col justify-between flex-1 min-w-0">' +
                        '<div>' +
                            '<h3 class="font-bold text-stone-900 truncate text-sm tracking-tight">' + item.name + '</h3>' +
                            '<p class="text-[11px] text-stone-500 line-clamp-2 mt-0.5 leading-relaxed font-normal">' + item.description + '</p>' +
                        '</div>' +
                        '<div class="flex justify-between items-end">' +
                            '<span class="text-amber-900 font-extrabold text-sm tracking-tight bg-amber-50 px-2.5 py-1 rounded-lg border border-amber-100/50">' + item.price + ' TL</span>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        
        function filterCategory(cat) {
            activeCategory = cat;
            renderCategories();
            renderItems();
        }

        fetchMenu();
    </script>
</body>
</html>
