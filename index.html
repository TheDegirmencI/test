<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koncuk Pastanesi - Menü</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #B4D3C4;
            --sage-dark: #6E9683;
            --cream: #F4F1E9;
            --paper: #FFFDF9;
            --gold: #C7A45C;
            --gold-deep: #9C7C3E;
            --charcoal: #2C3832;
        }
        body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--charcoal); }
        .font-display { font-family: 'Fraunces', serif; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

        /* Scalloped "box lid" edge under the header */
        .scallop-edge {
            -webkit-mask-image: radial-gradient(circle at 10px 0, transparent 10px, black 10.5px);
            -webkit-mask-size: 20px 20px;
            -webkit-mask-repeat: repeat-x;
            -webkit-mask-position: bottom;
            mask-image: radial-gradient(circle at 10px 0, transparent 10px, black 10.5px);
            mask-size: 20px 20px;
            mask-repeat: repeat-x;
            mask-position: bottom;
        }

        .price-tag {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            color: var(--gold-deep);
            background: #FAF3E4;
            border: 1px solid #E7D5A9;
        }
    </style>
</head>
<body class="min-h-screen pb-10 antialiased">

    <!-- Header: bakery box lid -->
    <header class="relative pb-6" style="background: linear-gradient(180deg, var(--sage) 0%, var(--sage-dark) 100%);">
        <div class="pt-8 pb-10 text-center relative z-10">
            <img src="koncuk-logo.png" alt="Konçuk Pastanesi" class="mx-auto w-28 h-28 rounded-full shadow-sm" style="box-shadow: 0 2px 12px rgba(0,0,0,0.12);">
        </div>
        <div class="absolute bottom-0 left-0 right-0 h-4 scallop-edge" style="background: var(--cream);"></div>
    </header>

    <!-- Ana Konteyner -->
    <main class="max-w-md mx-auto px-4 mt-2">

        <!-- Kategoriler -->
        <div id="categories" class="flex gap-2 overflow-x-auto pb-4 mb-2 scrollbar-none snap-x"></div>

        <!-- Ürün Kartları Listesi -->
        <div id="menu-items" class="space-y-4">
            <div class="flex flex-col items-center justify-center py-16">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 mb-3" style="border-color: var(--sage-dark);"></div>
                <p class="text-sm font-medium" style="color: var(--charcoal); opacity: 0.6;">Lezzetler yükleniyor...</p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center pt-8 pb-2">
            <a href="https://www.instagram.com/koncukpastanesi" target="_blank" rel="noopener"
               class="inline-flex items-center gap-1.5 text-xs font-medium tracking-wide"
               style="color: var(--gold-deep); opacity: 0.75;">
                @koncukpastanesi
            </a>
        </footer>
    </main>

    <script>
    // ===================================================
    // SADECE BURAYA KENDİ GOOGLE SHEET ID'Nİ YAPIŞTIR
    // ===================================================
    const SHEET_ID = '1jNADW0b_Hz8lmTrIuIr7QhupaMttfag-L1fLfqSiDy4';

    const url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json";
    let menuData = [];
    let activeCategory = 'Hepsi';

    async function fetchMenu() {
        try {
            const res = await fetch(url);
            const text = await res.text();

            const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/);
            if (!match) throw new Error('Beklenmeyen yanıt formatı');
            const json = JSON.parse(match[1]);
            const rows = json.table.rows || [];

            menuData = rows.map(function (row) {
                return {
                    category: row.c[0] && row.c[0].v ? String(row.c[0].v).trim() : 'Diğer',
                    name: row.c[1] && row.c[1].v ? String(row.c[1].v).trim() : '',
                    description: row.c[2] && row.c[2].v ? String(row.c[2].v).trim() : '',
                    price: row.c[3] && row.c[3].v != null ? row.c[3].v : 0,
                    image: row.c[4] && row.c[4].v ? String(row.c[4].v).trim() : '',
                    active: row.c[5] && row.c[5].v ? String(row.c[5].v).trim().toUpperCase() : 'Y'
                };
            }).filter(function (item) {
                return item.active === 'Y' && item.name !== '';
            });

            renderCategories();
            renderItems();
        } catch (err) {
            console.error("Hata:", err);
            document.getElementById('menu-items').innerHTML =
                '<div class="text-center py-10 rounded-2xl border p-4" style="background:#F8E9E9; border-color:#E9C7C7;">' +
                '<p class="font-medium text-sm" style="color: var(--gold-deep);">Menü şu an yüklenemedi, birazdan tekrar deneyin.</p>' +
                '</div>';
        }
    }

    function formatPrice(price) {
        const num = Number(price);
        if (Number.isNaN(num)) return price + ' TL';
        return num.toLocaleString('tr-TR', { maximumFractionDigits: 2 }) + ' TL';
    }

    function renderCategories() {
        const rawCategories = menuData.map(function (item) { return item.category; });
        const uniqueCategories = ['Hepsi', ...new Set(rawCategories)];
        const container = document.getElementById('categories');

        container.innerHTML = uniqueCategories.map(function (cat) {
            const isSelected = cat === activeCategory;
            const style = isSelected
                ? 'background: var(--sage-dark); color: #F3E4D4; border-color: var(--sage-dark);'
                : 'background: var(--paper); color: var(--charcoal); border-color: #E3D5BC;';

            return '<button onclick="filterCategory(\'' + cat.replace(/'/g, "\\'") + '\')" ' +
                'class="px-5 py-2.5 rounded-full text-xs tracking-wide font-semibold border transition-all duration-200 whitespace-nowrap snap-center" ' +
                'style="' + style + '">' + cat + '</button>';
        }).join('');
    }

    function renderItems() {
        const container = document.getElementById('menu-items');
        const filtered = activeCategory === 'Hepsi'
            ? menuData
            : menuData.filter(function (item) { return item.category === activeCategory; });

        if (filtered.length === 0) {
            container.innerHTML = '<p class="text-center py-12 text-sm font-medium" style="color: var(--charcoal);">Bu kategoride henüz ürün bulunmuyor.</p>';
            return;
        }

        container.innerHTML = filtered.map(function (item) {
            // loading="lazy" eklendi (Hızlandırma için)
            const imageBlock = item.image
                ? '<img src="' + item.image + '" loading="lazy" class="w-full h-full object-cover" alt="' + item.name + '" onerror="this.parentElement.innerHTML=\'' + placeholderSvg() + '\'">'
                : placeholderSvg();

            return '<div class="rounded-2xl overflow-hidden flex h-28 border transition-transform duration-150 active:scale-[0.99]" ' +
                'style="background: var(--paper); border-color: #E9DCC3;">' +
                '<div class="w-28 h-full flex-shrink-0" style="background: var(--cream);">' + imageBlock + '</div>' +
                '<div class="p-3.5 flex flex-col justify-between flex-1 min-w-0">' +
                '<div>' +
                '<h3 class="font-display font-semibold truncate text-[15px] tracking-tight" style="color: var(--charcoal);">' + item.name + '</h3>' +
                // opacity: 0.6 buradan kaldırıldı (Soluk yazılar düzeltildi)
                '<p class="text-[11px] mt-0.5 leading-relaxed font-normal line-clamp-2" style="color: var(--charcoal);">' + item.description + '</p>' +
                '</div>' +
                '<div class="flex justify-start">' +
                '<span class="price-tag text-[13px] px-2.5 py-1 rounded-lg">' + formatPrice(item.price) + '</span>' +
                '</div>' +
                '</div>' +
                '</div>';
        }).join('');
    }

    function placeholderSvg() {
        // opacity: 0.5 buradan kaldırıldı (Soluk ikonlar düzeltildi)
        return '<div class="w-full h-full flex items-center justify-center" style="color: var(--gold);">' +
            '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
            '<path d="M4 19h16M6 19V9a6 6 0 0112 0v10" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
    }

    function filterCategory(cat) {
        activeCategory = cat;
        renderCategories();
        renderItems();
    }

    fetchMenu();
</script>
</body>
</html>
